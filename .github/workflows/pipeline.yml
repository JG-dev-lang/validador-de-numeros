name: Pipeline Simples

on:
  push:
    branches: [ "main" ]

jobs:
  teste:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Rodar testes
        run: python -m unittest discover
